<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Absensi Guru YASPI</title>
  <link rel="manifest" href="manifest.json">
  <link class="apple-touch-icon" href="https://i.ibb.co.com/S4nnjtZz/Logo-Absen-VM.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
    .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    h2 { color: #1a3a5f; margin-bottom: 10px; }
    .form-group { text-align: left; margin-bottom: 15px; }
    label { font-weight: bold; font-size: 13px; color: #444; display: block; margin-bottom: 5px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    .btn { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn:hover { background-color: #0056b3; }
    
    .btn-install { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: none; }
    .btn-install:hover { background-color: #218838; }

    #reader { width: 100%; margin-top: 20px; border-radius: 10px; overflow: hidden; background: #eee; }
    .radio-group { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
    .radio-label { font-weight: bold; cursor: pointer; font-size: 16px; padding: 10px 20px; border: 2px solid #ccc; border-radius: 8px; }
    input[type="radio"]:checked + span { color: #007bff; }
    .info-saved { background-color: #e2f0d9; color: #385723; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; border: 1px solid #b4c6e7; }
    #loading { display: none; color: #007bff; font-weight: bold; margin-top: 15px; }
  </style>
</head>
<body>
<div class="container">
  
  <button id="install-button" class="btn-install">📲 Pasang Aplikasi Absen di Layar HP</button>

  <img src="https://i.ibb.co.com/yFbhLfRF/Logo-Yaspi.png" alt="Logo YASPI" style="width: 100px; height: auto; margin-bottom: 15px;">
  
  <h2>📷 Scanner Absensi Guru YASPI</h2>

  <div id="setup-form">
    <p style="color: #666;">Isi biodata sekali saja, tersimpan aman di HP Anda.</p>
    <div class="form-group">
      <label>Nama Lengkap Guru:</label>
      <input type="text" id="guru-name" placeholder="Nama Lengkap dan Gelar">
    </div>
    <div class="form-group">
      <label>Unit Sekolah:</label>
      <select id="guru-unit">
        <option value="">-- Pilih Unit Sekolah --</option>
        <option value="SD Yaspi">SD Yaspi</option>
        <option value="SMP Yaspi">SMP Yaspi</option>
        <option value="SMK Yaspi">SMK Yaspi</option>
        <option value="MTs Yaspi">MTs Yaspi</option>
        <option value="Aliyah Yaspi">Aliyah Yaspi</option>
      </select>
    </div>
    <div class="form-group">
      <label>Email Aktif:</label>
      <input type="email" id="guru-email" placeholder="contoh@gmail.com">
    </div>
    <button class="btn" onclick="saveBiodata()">💾 Simpan Biodata</button>
  </div>

  <div id="info-box" class="info-saved" style="display:none;">
    👤 <b>Biodata Aktif:</b> <span id="lbl-nama"></span> [<span id="lbl-unit"></span>]  
    <br><span style="font-size:12px; color:#c00000; cursor:pointer; text-decoration:underline; font-weight:bold;" onclick="resetBiodata()">[Ganti/Reset Biodata]</span>
  </div>

  <div id="action-area" style="display:none;">
    <div class="radio-group">
      <label class="radio-label"><input type="radio" name="absen_action" value="masuk" checked> 🟢 MASUK</label>
      <label class="radio-label"><input type="radio" name="absen_action" value="keluar"> 🔴 KELUAR</label>
    </div>
    
    <div id="reader"></div>
    <div id="loading">⏳ Memproses Absensi Anda, Mohon Tunggu...</div>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOhTx42ERoJc0lndVpJf71ctqJYcdcNWPfFnaD3VMCqHnVq6suB-y-WnyaREEiEsY1/exec"; 

let deferredPrompt;
const installBtn = document.getElementById('install-button');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  }
});

window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
  alert("Aplikasi Absen YASPI berhasil terpasang di layar HP Anda!");
});

window.onload = function() { 
  checkSavedData(); 
};

function saveBiodata() {
  const name = document.getElementById("guru-name").value.trim();
  const unit = document.getElementById("guru-unit").value;
  const email = document.getElementById("guru-email").value.trim();
  
  if (!name || !unit || !email) { 
    alert("Mohon isi semua data dengan lengkap!"); 
    return; 
  }
  
  localStorage.setItem("yaspi_nama", name);
  localStorage.setItem("yaspi_unit", unit);
  localStorage.setItem("yaspi_email", email);
  checkSavedData();
}

function checkSavedData() {
  const name = localStorage.getItem("yaspi_nama");
  const unit = localStorage.getItem("yaspi_unit");
  const email = localStorage.getItem("yaspi_email");
  
  if (name && unit && email) {
    document.getElementById("setup-form").style.display = "none";
    document.getElementById("info-box").style.display = "block";
    document.getElementById("action-area").style.display = "block";
    document.getElementById("lbl-nama").innerText = name;
    document.getElementById("lbl-unit").innerText = unit;
    
    setTimeout(startScanner, 500);
  }
}

function resetBiodata() {
  if(confirm("Apakah Anda ingin mengganti biodata?")) {
    localStorage.clear();
    location.reload();
  }
}

function startScanner() {
  Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length > 0) {
      let cameraId = devices[0].id; 
      
      const backCamera = devices.find(device => 
        device.label.toLowerCase().includes('back') || 
        device.label.toLowerCase().includes('rear') ||
        device.label.toLowerCase().includes('environment')
      );
      
      if (backCamera) {
        cameraId = backCamera.id;
      }

      const html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        cameraId, 
        {
          fps: 10,
          qrbox: { width: 250, height: 250 }
        },
        onScanSuccess,
        onScanError
      ).catch(err => {
        console.error("Gagal mengunci kamera khusus, mencoba kamera default:", err);
        const fallbackScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        fallbackScanner.render(onScanSuccess, onScanError);
      });
    } else {
      alert("Kamera tidak ditemukan di perangkat ini.");
    }
  }).catch(err => {
    alert("Gagal mengakses izin kamera: " + err);
  });
}

let isProcessing = false;

function onScanSuccess(decodedText) {
  if (isProcessing) return; 
  isProcessing = true;

  // 1. Ambil data status dari tombol radio yang dicentang
  const action = document.querySelector('input[name="absen_action"]:checked').value;
  
  // 2. Ambil teks asli isi QR Code kustommu
  const kelas = decodedText.trim(); 

  // 3. Ambil biodata murni dari penyimpanan lokal HP
  const name = localStorage.getItem("yaspi_nama") || "Tanpa Nama";
  const unit = localStorage.getItem("yaspi_unit") || "-";
  const email = localStorage.getItem("yaspi_email") || "-";

  // Efek Loading
  document.getElementById('reader').style.display = "none";
  document.getElementById('loading').style.display = "block";

  // 4. Proses GPS Geolocation
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        kirimKeGoogleSheet(action, kelas, name, unit, email, lat, lng);
      },
      function(error) {
        alert("GPS Gagal dimuat. Absensi tetap dikirim tanpa koordinat.");
        kirimKeGoogleSheet(action, kelas, name, unit, email, 0, 0);
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  } else {
    kirimKeGoogleSheet(action, kelas, name, unit, email, 0, 0);
  }
}

function onScanError(errorMessage) {
  console.log("Mencari QR Code...");
}

function kirimKeGoogleSheet(action, kelas, name, unit, email, lat, lng) {
  let finalUrl = `${WEB_APP_URL}?action=${action}&kelas=${encodeURIComponent(kelas)}&nama=${encodeURIComponent(name)}&unit=${encodeURIComponent(unit)}&email=${encodeURIComponent(email)}&lat=${lat}&lng=${lng}`;
  window.open(finalUrl, "_top");
}
</script>
</body>
</html>
